<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 6 hexagon points logo with 10% padding - DEV version with pink/rose gradient -->
  
  <defs>
    <!-- Gradient: Rose 400 (#FB7185) top to Rose 700 (#BE123C) bottom -->
    <linearGradient id="roseGradient" x1="0%" y1="0%" x2="0%" y2="100%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#FB7185;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BE123C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hexagon points (circles with rose gradient) -->
  <!-- Top -->
  <circle cx="256" cy="112.64" r="28.67" fill="url(#roseGradient)"/>
  <!-- Top Right -->
  <circle cx="380.16" cy="184.32" r="28.67" fill="url(#roseGradient)"/>
  <!-- Top Left -->
  <circle cx="131.84" cy="184.32" r="28.67" fill="url(#roseGradient)"/>
  <!-- Bottom Right -->
  <circle cx="380.16" cy="327.68" r="28.67" fill="url(#roseGradient)"/>
  <!-- Bottom Left -->
  <circle cx="131.84" cy="327.68" r="28.67" fill="url(#roseGradient)"/>
  <!-- Bottom -->
  <circle cx="256" cy="399.36" r="28.67" fill="url(#roseGradient)"/>
</svg>
